name: downloader_v2
description: DIAW Downloader V2 — Premium Social Media Downloader
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP & Downloads
  http: ^1.2.1
  dio: ^5.4.3+1
  simple_icons: ^14.6.1
  
  # Media Playback
  video_player: ^2.8.6
  chewie: ^1.7.5
  
  # File & Permissions
  permission_handler: ^11.3.1
  gal: ^2.3.2
  
  # Animations
  flutter_animate: ^4.5.0
  
  # URL Launcher (for fallback)
  url_launcher: ^6.3.0
  
  # Connectivity check (wajib internet)
  connectivity_plus: ^6.0.5
  
  # Image caching for thumbnails — using built-in Image.network instead

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/logo.png"
  min_sdk_android: 21 # android >= 5.0
  adaptive_icon_background: "#0a0a0a"
  adaptive_icon_foreground: "assets/images/logo.png"

dependency_overrides:
  # Memaksa flutter untuk mengabaikan package bermasalah di Windows saat build Android
  path_provider_foundation: 2.4.0
  objective_c: 9.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/developer.jpg


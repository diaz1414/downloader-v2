name: downloader_v2
description: DIAW Downloader V2 — Premium Social Media Downloader
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP
  http: ^1.2.1
  
  # Animations
  flutter_animate: ^4.5.0
  
  # URL Launcher (open download links in browser)
  url_launcher: ^6.3.0
  
  # Connectivity check (wajib internet)
  connectivity_plus: ^6.0.5
  
  # Image caching for thumbnails — using built-in Image.network instead

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

